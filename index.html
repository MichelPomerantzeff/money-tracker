<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Money Tracker</title>
</head>

<body>
    <main>
        <h1>Money Tracker</h1>
        <div class="main_container">
            
            <div class="totals">
                
                <div class="money_in">
                    <h2>Money Earned</h2>
                    <div class="total_earned">€ 0</div>
                </div>
                
                <div class="money_available">
                    <h2>Money Available</h2>
                    <div class="total_available">€ 0</div>
                </div>
                
                <div class="money_out">
                    <h2>Money Spent</h2>
                    <div class="total_spent">€ 0</div>
                </div>
            </div>
            
            <div class="add_container">
                <div class="inputs">
                    <input class="description" type="text" placeholder="description">
                    <input class="value" type="number" placeholder="value">
                </div>

                <div class="add_buttons">
                    <button class="income_button">Add Income</button>
                    <button class="expense_button">Add expense</button>
                </div>
            </div>

            <div class="stored_values_container">
                <div class="stored_income_container">
                    <h1 class="income_title">Income</h1>
                    <div class="income_result"></div>
                </div>
                <div class="stored_expenses_container">
                    <h1 class="expense_title">Expenses</h1>
                    <div class="expense_result"></div>
                </div>
            </div>

        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
